# ============================================================================
# MANT 配置模板
# 使用：复制为 config/settings.yaml 后按本机环境修改（settings.yaml 已 gitignore）。
# 约定：各模块通过参数接收配置字典，不直接读取本文件（CLI / 脚本入口除外）。
# ============================================================================

llm:
  # LLMClient 分 fast / strong 两档：高频轻量调用走 fast，质量敏感调用走 strong。
  providers:
    fast:
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-v4-flash"
      api_key_env: "DEEPSEEK_API_KEY" # key 从环境变量读取，禁止写入配置文件
      partial_retries: 1               # 流中断/输出截断时丢弃残稿并完整重试
    strong:
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-v4-flash"
      api_key_env: "DEEPSEEK_API_KEY"
      partial_retries: 1

memory:
  sqlite_path: "data/memory/mant.db"   # 术语库 / 翻译记忆库 TM（预留可切 Postgres）
  faiss_index_dir: "data/memory/faiss" # FAISS 向量索引目录（RAG 检索）

pipeline:
  raw_dir: "data/raw"                  # M1 采集的原始语料
  aligned_dir: "data/aligned"          # 句对齐后的平行语料
  glossary_dir: "data/glossary"        # 术语抽取结果 / 术语库导出
  glossary_db: "data/memory/mant.db"   # 运行时术语库；与 memory.sqlite_path 保持一致

workflow:
  max_rework: 2                        # QA 不达标允许的最大回退返工次数
  min_polished_segment_ratio: 0.5      # 润色稿过短时判不完整并回退该片初稿
  max_polished_segment_ratio: 2.5      # 润色稿异常膨胀时判不完整并回退该片初稿

# 角色级生成参数会进入 checkpoint 语义指纹；修改后不会误复用旧结果。
agents:
  terminologist:
    thinking: disabled                  # DeepSeek 结构化抽取不需要思考模式
  translator:
    thinking: disabled                  # 翻译正文不输出/计费长推理
  editor:
    temperature: 0.0
    max_tokens: 1536
    max_review_notes: 6                # 合并同类问题并按 high 优先，防止逐段穷举撑爆输出
    max_span_chars: 80
    max_suggestion_chars: 160
    compact_recovery_attempts: 1       # 截断/schema 失败后用更小契约恢复，不原样重试
    compact_recovery_max_tokens: 768
    compact_recovery_max_notes: 3
    structured_json: true
    thinking: disabled
  polisher:
    thinking: disabled
  qa:
    temperature: 0.0
    max_tokens: 768                    # QA 只需紧凑 JSON，避免长推理耗尽输出
    structured_json: true              # 向兼容端点请求 JSON object 模式
    repair_attempts: 1                 # schema 无效时最多做一次短 JSON 修复
    repair_max_tokens: 384
    pass_score_threshold: 7.0          # 阈值是必要条件；模型明确 rework 时仍不放行
    min_dimension_score: 6.0
    thinking: disabled

# 在线翻译的初始切片完全由机械规则完成，不调用 LLM。
# token 数是无供应商 tokenizer 时的保守估算；每片正文绝不超过 max_core_tokens。
segmentation:
  target_core_tokens: 900              # 动态规划优先靠近的正文片大小
  max_core_tokens: 1200                # 单片正文硬上限
  min_core_tokens: 250                 # 非末片的软下限，必要时允许更短
  context_before_tokens: 160           # 仅供理解、不进入译文的相邻上文
  context_after_tokens: 80             # 仅供理解、不进入译文的相邻下文
  max_segments: 5000                   # 异常输入保护上限

# 切片间有界并发。正式启用前先用小文本验证供应商限流与费用预算。
concurrency:
  enabled: false                       # 默认保持串行；验证后再开启
  global_max_in_flight: 4              # 全局最大在途片段任务
  stages:
    terminology: 2
    translate: 4
    edit: 4
    revise: 4                          # 仅有事实性审校意见的片段会产生调用
    polish: 6
    qa: 4
  budget:
    max_segment_calls: 0               # 0 表示不限；生产环境应设硬上限
    max_failures: 0                    # 全局上限；0 表示不限
    max_failures_per_stage:            # 独立熔断，避免上游失败挤占 QA 额度
      translate: 8
      edit: 8
      revise: 8
      polish: 8
      qa: 20
  checkpoint:
    enabled: false
    sqlite_path: "data/runtime/checkpoints.db"
  manifest:
    enabled: false                     # 正式启用 checkpoint 时建议同时开启
    directory: "data/runtime/runs"     # 保存恢复所需状态；该目录已被 gitignore

observability:
  enabled: true                        # 统一启用终端事件与运行追踪
  trace_dir: "data/traces"             # 每次运行一个 JSONL，供 SSE 监控页实时读取
  sqlite_path: "data/traces/runs.db"   # 运行摘要与非 token 事件，便于查询/评估
  terminal:
    enabled: true                      # 默认显示 Agent 起止状态
    stream_tokens: false               # CLI --stream 可临时开启真实 token 输出
    verbose: false                     # CLI --verbose 可显示节点/路由/重试细节
  trace:
    enabled: true
    sqlite_enabled: true
    token_batch_chars: 80              # 合批写盘，兼顾实时性与 I/O 压力
  dashboard:
    host: "127.0.0.1"                  # 默认仅本机访问，避免泄露文本与运行轨迹
    port: 8765
    max_input_chars: 200000            # 浏览器粘贴/拖入文本的字符上限
