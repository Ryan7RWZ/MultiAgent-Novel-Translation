# ============================================================================
# MANT 配置模板
# 使用：复制为 config/settings.yaml 后按本机环境修改（settings.yaml 已 gitignore）。
# 约定：各模块通过参数接收配置字典，不直接读取本文件（CLI / 脚本入口除外）。
# ============================================================================

llm:
  # LLMClient 分 fast / strong 两档：高频轻量调用走 fast，质量敏感调用走 strong。
  providers:
    fast:
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o-mini"
      api_key_env: "OPENAI_API_KEY"   # key 从环境变量读取，禁止写入配置文件
    strong:
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"

memory:
  sqlite_path: "data/memory/mant.db"   # 术语库 / 翻译记忆库 TM（预留可切 Postgres）
  faiss_index_dir: "data/memory/faiss" # FAISS 向量索引目录（RAG 检索）

pipeline:
  raw_dir: "data/raw"                  # M1 采集的原始语料
  aligned_dir: "data/aligned"          # 句对齐后的平行语料
  glossary_dir: "data/glossary"        # 术语抽取结果 / 术语库导出

workflow:
  max_rework: 2                        # QA 不达标允许的最大回退返工次数
